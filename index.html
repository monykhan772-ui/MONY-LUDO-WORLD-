<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake &amp; Ladder — Premium 3D Edition</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="confettiCanvas" class="hidden"></canvas>

<!-- SPLASH SCREEN -->
<section id="splash" class="screen">
  <div class="glow-frame">
    <div class="snake-deco">🐍 🪜</div>
    <h1 class="welcome-title">Welcome</h1>
    <p class="tagline">You're about to play <b>Premium 3D Snake &amp; Ladder</b></p>
    <button class="btn btn-start" id="goToPlayerSelect">Start ▶</button>
  </div>
  <div class="footer-credit">Tap the sound icon in-game to mute/unmute</div>
</section>

<!-- PLAYER SELECT SCREEN -->
<section id="playerSelect" class="screen hidden">
  <h2>How Many Players?</h2>
  <p class="sub">Choose the number of players (2, 3 or 4)</p>
  <div class="count-row">
    <button class="count-btn" data-count="2">2<span>Players</span></button>
    <button class="count-btn" data-count="3">3<span>Players</span></button>
    <button class="count-btn" data-count="4">4<span>Players</span></button>
  </div>
  <div class="player-chip-row" id="chipRow"></div>
  <button class="btn" id="beginGameBtn">Begin Game 🎲</button>
</section>

<!-- GAME SCREEN -->
<section id="gameBoard" class="screen hidden">
  <div class="top-bar">
    <div class="title-mini">🐍 Snake &amp; Ladder</div>
    <button class="sound-toggle" id="soundToggle">🔊 Sound: On</button>
  </div>

  <div class="game-wrap">
    <div class="board-stage">
      <div class="board-frame">
        <div class="board" id="board"></div>
      </div>
    </div>

    <div class="side-panel">
      <div class="turn-banner" id="turnBanner">Player 1's turn</div>
      <div class="players-list" id="playersList"></div>
      <div class="dice-area">
        <div class="dice" id="dice">
          <div class="pip" id="p1"></div><div class="pip" id="p2"></div><div class="pip" id="p3"></div>
          <div class="pip" id="p4"></div><div class="pip" id="p5"></div><div class="pip" id="p6"></div>
          <div class="pip" id="p7"></div><div class="pip" id="p8"></div><div class="pip" id="p9"></div>
        </div>
        <button class="btn roll-btn" id="rollBtn">Roll Dice 🎲</button>
      </div>
    </div>
  </div>
</section>

<!-- WIN OVERLAY -->
<div id="winOverlay" class="hidden">
  <div class="win-card">
    <h2 id="winText">🏆 Player 1 Wins!</h2>
    <p>Congratulations, champion of the board.</p>
    <button class="btn" id="playAgainBtn">Play Again</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
