<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👑 MONY GAME 👑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash">
    <div class="logo">M</div>
    <h1>👑 MONY GAME 👑</h1>
  </div>

  <!-- Title -->
  <h1 class="title">👑 MONY GAME 👑</h1>

  <!-- Player Selection -->
  <div id="player-select">
    <p>Select Players:</p>
    <button onclick="startGame(2)">2 Players</button>
    <button onclick="startGame(3)">3 Players</button>
    <button onclick="startGame(4)">4 Players</button>
  </div>

  <!-- Board -->
  <div id="board">
    <svg id="overlay" width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <!-- Example snake -->
      <g class="snake">
        <path d="M 900 100 Q 800 300 600 500 Q 400 700 200 900" />
      </g>
      <!-- Example ladder -->
      <g class="ladder">
        <line x1="300" y1="900" x2="300" y2="600" />
        <line x1="350" y1="900" x2="350" y2="600" />
        <rect x="300" y="650" width="50" height="10" />
        <rect x="300" y="700" width="50" height="10" />
        <rect x="300" y="750" width="50" height="10" />
      </g>
    </svg>
  </div>

  <!-- Dice Container -->
  <div id="dice-container"></div>

  <!-- Controls -->
  <div id="controls">
    <button onclick="newGame()">New Game</button>
    <button onclick="restartGame()">Restart</button>
    <button onclick="toggleSound()">Sound ON/OFF</button>
  </div>

  <!-- Audio -->
  <audio id="dice-sound" src="dice.mp3"></audio>
  <audio id="snake-sound" src="snake.mp3"></audio>
  <audio id="ladder-sound" src="ladder.mp3"></audio>
  <audio id="win-sound" src="win.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
